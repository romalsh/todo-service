services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d todo']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: todo
      JWT_SECRET: change-me-in-production-min-32-characters-long
      JWT_EXPIRES_IN: 1h
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      THROTTLE_AUTH_TTL: 60
      THROTTLE_AUTH_LIMIT: 10
    ports:
      - '3000:3000'

volumes:
  pgdata:
